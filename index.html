<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order summary card</title>
    <link rel="icon" href="images/favicon-32x32.png" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
    <article class="order">
      <img class="order__img" src="images/illustration-hero.svg" alt="illustration" />
      <h1 class="order__title">Order Summary</h1>
      <p class="order__description">
        You can now listen to millions of songs, audiobooks, and podcasts on any
        device anywhere you like!
      </p>
      <div class="plan">
        <img class="plan__icon" src="images/icon-music.svg" alt="music icon">
        <div class="plan__info">
            <h2 class="plan__title">Annual Plan</h2>
            <span class="plan__price">$59.99/year</span>
        </div>
        <a href="" class="plan__link">Change</a>
      </div>
      <div class="order__actions">
          <button type="button" class="order__button">Proceed to Payment</button>
          <button type="button" class="order__button--cancel">Cancel Order</button>
      </div>
    </article>
    </main>
  </body>
</html>
